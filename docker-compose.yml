version: "3.8"

services:
  # ============================
  # PostgreSQL Database
  # ============================
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ats_db}
      POSTGRES_USER: ${POSTGRES_USER:-ats_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ats_user} -d ${POSTGRES_DB:-ats_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ats-network

  # ============================
  # Backend - FastAPI
  # ============================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ats_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ats_db}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DEBUG: ${DEBUG:-false}
      PORT: 8000
      HOST: 0.0.0.0
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10}
      UPLOAD_DIR: /app/uploads
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ats-network

  # ============================
  # Frontend - React + Nginx
  # ============================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:?REACT_APP_API_URL is required}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - ats-network

volumes:
  postgres_data:
  uploads_data:
  logs_data:

networks:
  ats-network:
    driver: bridge
